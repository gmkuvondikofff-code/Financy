<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Financy | Sozlamalar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .bg-main { background: radial-gradient(circle at top left, #e0f7fa 0%, #ffffff 50%, #80deea 100%); }
        .danger-zone { border: 2px dashed rgba(244, 63, 94, 0.3); }
    </style>
</head>
<body class="bg-main min-h-screen pb-24">

    <div class="max-w-4xl mx-auto p-4 lg:p-10">
        <header class="glass p-6 rounded-[2.5rem] flex justify-between items-center mb-8 shadow-sm">
            <div class="flex items-center gap-4">
                <a href="/dashboard?email={{ user.email }}" class="w-10 h-10 glass rounded-full flex items-center justify-center text-sky-600 hover:bg-white transition">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1 class="text-xl font-black text-sky-900 uppercase">Sozlamalar</h1>
            </div>
            <i class="fas fa-cog text-sky-200 text-2xl"></i>
        </header>

        <div class="space-y-6">
            <section class="glass p-8 rounded-[3rem] shadow-xl">
                <h2 class="text-sm font-black text-sky-900 mb-6 uppercase tracking-widest italic">Profil ma'lumotlari</h2>
                <form class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 ml-4">TO'LIQ ISM</label>
                        <input type="text" value="{{ user.fullname }}" class="w-full bg-white/50 border-none outline-none rounded-2xl px-6 py-4 text-sm font-bold text-sky-900 shadow-inner focus:ring-2 focus:ring-sky-400 transition">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 ml-4">YANGI PAROL</label>
                        <input type="password" placeholder="********" class="w-full bg-white/50 border-none outline-none rounded-2xl px-6 py-4 text-sm font-bold text-sky-900 shadow-inner focus:ring-2 focus:ring-sky-400 transition">
                    </div>
                    <button type="button" class="w-full py-4 bg-sky-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-sky-200 hover:bg-sky-700 active:scale-95 transition">
                        O'zgarishlarni saqlash
                    </button>
                </form>
            </section>

            <section class="glass p-8 rounded-[3rem] danger-zone bg-red-50/10">
                <h2 class="text-sm font-black text-red-600 mb-6 uppercase tracking-widest italic">Xavfli hudud</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button class="p-6 bg-white/60 rounded-[2rem] border border-red-100 flex flex-col items-center gap-3 hover:bg-red-500 hover:text-white transition group">
                        <i class="fas fa-comment-slash text-xl text-red-500 group-hover:text-white"></i>
                        <span class="text-[10px] font-black uppercase">AI Tarixini tozalash</span>
                    </button>
                    <button class="p-6 bg-white/60 rounded-[2rem] border border-red-100 flex flex-col items-center gap-3 hover:bg-red-600 hover:text-white transition group">
                        <i class="fas fa-trash-can text-xl text-red-500 group-hover:text-white"></i>
                        <span class="text-[10px] font-black uppercase">Barcha ma'lumotlarni o'chirish</span>
                    </button>
                </div>
                <p class="mt-6 text-[10px] text-center font-bold text-red-400 italic underline">Ushbu amallarni ortga qaytarib bo'lmaydi!</p>
            </section>

            <a href="/login" class="flex items-center justify-center p-6 glass rounded-[2.5rem] text-red-500 font-black text-sm uppercase tracking-[0.3em] hover:bg-red-50 transition shadow-sm border border-red-100">
                <i class="fas fa-sign-out-alt mr-3"></i> Tizimdan chiqish
            </a>
        </div>
    </div>

    <nav class="lg:hidden fixed bottom-6 left-6 right-6 z-50">
        <div class="glass rounded-[2.5rem] p-3 flex justify-between items-center shadow-2xl border border-white">
            <a href="/dashboard?email={{ user.email }}" class="w-12 h-12 text-sky-900 flex items-center justify-center"><i class="fas fa-th-large text-xl"></i></a>
            <a href="/inventory?email={{ user.email }}" class="w-12 h-12 text-sky-900 flex items-center justify-center"><i class="fas fa-box-archive text-xl"></i></a>
            <a href="/debts?email={{ user.email }}" class="w-12 h-12 text-sky-900 flex items-center justify-center"><i class="fas fa-hand-holding-dollar text-xl"></i></a>
            <a href="/ai-chat?email={{ user.email }}" class="w-12 h-12 text-sky-900 flex items-center justify-center"><i class="fas fa-robot text-xl"></i></a>
        </div>
    </nav>

</body>
</html>
