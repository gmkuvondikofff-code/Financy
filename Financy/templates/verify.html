<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Financy | Tasdiqlash</title>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .bg-aqua { background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%); }
    </style>
</head>
<body class="bg-aqua min-h-screen flex items-center justify-center p-4">
    <div class="glass w-full max-w-md rounded-[2.5rem] p-8 md:p-12 text-center shadow-2xl">
        <div class="w-20 h-20 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
            <i class="fas fa-shield-alt text-3xl"></i>
        </div>
        <h1 class="text-2xl font-black text-blue-900">Emailni tasdiqlang</h1>
        <p class="text-blue-800/60 text-sm mt-3 mb-8">Kodni <b>{{ email }}</b> manziliga yubordik.</p>

        <form action="/confirm" method="POST" class="space-y-6">
            <input type="hidden" name="email" value="{{ email }}">
            <input type="text" name="code" maxlength="6" placeholder="000000" 
                   class="w-full p-5 rounded-2xl border-none glass text-center text-4xl font-black tracking-[10px] text-blue-600 focus:ring-2 focus:ring-blue-400 outline-none transition" required>
            
            <button class="w-full bg-blue-500 text-white p-4 rounded-2xl font-black text-lg shadow-lg hover:bg-blue-600 active:scale-95 transition-all">
                Tasdiqlash
            </button>
        </form>

        <p class="mt-8 text-xs text-blue-900/40 uppercase font-bold tracking-widest cursor-pointer hover:text-blue-600 transition">
            Kodni qayta yuborish
        </p>
    </div>
</body>
</html>
