<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Financy | Ro'yxatdan o'tish</title>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .bg-aqua { background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%); }
    </style>
</head>
<body class="bg-aqua min-h-screen flex items-center justify-center p-4">
    <div class="glass w-full max-w-lg rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center text-white mx-auto shadow-lg mb-4">
                <i class="fas fa-user-plus text-2xl"></i>
            </div>
            <h1 class="text-3xl font-black text-blue-900">Ro'yxatdan o'tish</h1>
            <p class="text-blue-800/60 text-sm mt-2">Financy bilan biznesingizni raqamlashtiring</p>
        </div>

        <form action="/register" method="POST" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" name="fullname" placeholder="To'liq ismingiz" class="w-full p-4 rounded-2xl border-none glass focus:ring-2 focus:ring-blue-400 outline-none transition" required>
                <input type="email" name="email" placeholder="Email manzil" class="w-full p-4 rounded-2xl border-none glass focus:ring-2 focus:ring-blue-400 outline-none transition" required>
            </div>
            <input type="password" name="password" placeholder="Parol" class="w-full p-4 rounded-2xl border-none glass focus:ring-2 focus:ring-blue-400 outline-none transition" required>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select name="business_type" class="w-full p-4 rounded-2xl border-none glass focus:ring-2 focus:ring-blue-400 outline-none transition cursor-pointer">
                    <option value="sotuvchi">Sotuvchi (Do'kon)</option>
                    <option value="ishlab_chiqaruvchi">Ishlab chiqaruvchi</option>
                    <option value="xizmat_korsatuvchi">Xizmat ko'rsatuvchi</option>
                </select>
                <input type="text" name="business_name" placeholder="Biznes nomi" class="w-full p-4 rounded-2xl border-none glass focus:ring-2 focus:ring-blue-400 outline-none transition" required>
            </div>

            <button class="w-full bg-blue-500 text-white p-4 rounded-2xl font-black text-lg shadow-lg hover:bg-blue-600 active:scale-95 transition-all mt-4">
                Davom etish <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </form>

        <p class="text-center mt-8 text-sm text-blue-900/60 font-medium">
            Akkauntingiz bormi? <a href="/login" class="text-blue-600 font-bold hover:underline">Kirish</a>
        </p>
    </div>
</body>
</html>
