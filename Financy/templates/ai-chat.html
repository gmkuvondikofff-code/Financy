<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Financy | AI Tahlilchi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        @media (max-width: 1024px) {
            .chat-sidebar { position: fixed; left: -100%; top: 0; bottom: 0; z-index: 100; background: #f0f4f9; width: 80%; transition: 0.3s ease; }
            .sidebar-open { left: 0; }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 90; }
            .overlay.active { display: block; }
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .ai-message { line-height: 1.6; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#f0f4f9] h-[100dvh] overflow-hidden flex flex-col">

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <header class="p-3 lg:p-4 flex justify-between items-center bg-transparent z-10">
        <div class="flex items-center gap-3 lg:gap-4">
            <button onclick="toggleSidebar()" class="w-10 h-10 hover:bg-gray-200 rounded-full flex items-center justify-center transition">
                <i class="fas fa-bars text-gray-600"></i>
            </button>
            <h1 class="text-lg lg:text-xl font-bold text-gray-700">Financy <span class="text-blue-600">AI</span></h1>
        </div>
        <a href="/dashboard?email={{ user.email }}" class="text-[10px] font-black text-gray-400 hover:text-blue-600 border border-gray-200 px-3 py-1.5 rounded-full transition uppercase">
            Dashboard
        </a>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <aside id="sidebar" class="chat-sidebar lg:w-72 h-full flex flex-col p-4 space-y-2">
            <button onclick="window.location.reload()" class="flex items-center gap-3 px-5 py-3 bg-[#dde3ea] hover:bg-[#d3d9e0] rounded-full text-sm font-semibold text-gray-700 transition mb-6 shadow-sm">
                <i class="fas fa-plus"></i>
                <span>Yangi Chat</span>
            </button>

            <div class="flex-1 overflow-y-auto space-y-1" id="historyList">
                <p class="px-4 text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Tarix</p>
                </div>

            <div class="pt-4 border-t border-gray-200">
                <div class="flex items-center gap-3 p-3 bg-white/50 rounded-2xl">
                    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-xs uppercase">
                        {{ user.fullname[:1] }}
                    </div>
                    <span class="text-xs font-bold text-gray-600 truncate">{{ user.fullname }}</span>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col items-center bg-white lg:rounded-tl-[2.5rem] shadow-2xl relative overflow-hidden">
            <div class="flex-1 w-full max-w-3xl overflow-y-auto p-4 lg:p-8 space-y-6 chat-container" id="chatContainer">
                <div id="welcomeScreen" class="h-full flex flex-col items-center justify-center text-center space-y-6 py-10">
                    <div class="w-16 h-16 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-[1.5rem] shadow-xl flex items-center justify-center text-white text-2xl animate-bounce">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl lg:text-4xl font-semibold bg-gradient-to-r from-blue-600 to-purple-500 bg-clip-text text-transparent">
                            Salom, {{ user.fullname }}
                        </h2>
                        <p class="text-gray-400 mt-2 text-sm lg:text-base px-6">Rasm yuboring yoki biznesingiz haqida so'rang.</p>
                    </div>
                </div>
            </div>

            <div class="w-full max-w-4xl px-4 pb-4 lg:pb-8">
                <div id="imagePreviewContainer" class="hidden ml-4 mb-2 relative inline-block">
                    <img id="imagePreview" src="" class="h-24 w-24 object-cover rounded-2xl border-2 border-blue-500 shadow-md">
                    <button onclick="clearImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center shadow-lg">
                        <i class="fas fa-times text-xs"></i>
                    </button>
                </div>

                <div class="bg-[#f0f4f9] rounded-[2rem] p-2 lg:p-3 shadow-inner border border-transparent focus-within:ring-2 focus-within:ring-blue-100 transition-all">
                    <div class="flex items-end gap-2">
                        <div class="flex pb-2 pl-2">
                            <label class="w-10 h-10 hover:bg-white rounded-full flex items-center justify-center cursor-pointer transition text-gray-500">
                                <i class="fas fa-image"></i>
                                <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="previewImage(this)">
                            </label>
                        </div>
                        
                        <textarea 
                            id="chatInput"
                            rows="1" 
                            placeholder="Xabar yozing..." 
                            class="flex-1 bg-transparent border-none outline-none py-3 px-2 text-gray-700 text-sm lg:text-base resize-none max-h-40"
                        ></textarea>
                        
                        <button onclick="sendMessage()" class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 active:scale-90 transition shadow-lg shrink-0">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatInput = document.getElementById('chatInput');
        const imageInput = document.getElementById('imageInput');
        const userEmail = "{{ user.email }}";

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-open');
            document.getElementById('overlay').classList.toggle('active');
        }

        // Rasm preview funksiyasi
        function previewImage(input) {
            const container = document.getElementById('imagePreviewContainer');
            const preview = document.getElementById('imagePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    container.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearImage() {
            imageInput.value = "";
            document.getElementById('imagePreviewContainer').classList.add('hidden');
        }

        // Chat tarixini yuklash
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch(`/chat-history?email=${userEmail}`);
                const history = await response.json();
                if (history.length > 0) {
                    document.getElementById('welcomeScreen')?.remove();
                    history.forEach(msg => appendMessage(msg.role, msg.content, msg.image));
                }
            } catch (e) { console.error("Tarix yuklanmadi"); }
        });

        function appendMessage(role, content, imageUrl = null) {
            const isUser = role === 'user';
            const msgHtml = `
                <div class="flex ${isUser ? 'justify-end' : 'justify-start'} animate-fade-in mb-4">
                    <div class="flex flex-col ${isUser ? 'items-end' : 'items-start'} max-w-[85%]">
                        ${imageUrl ? `<img src="${imageUrl}" class="w-48 rounded-2xl mb-2 shadow-sm border border-gray-100">` : ''}
                        <div class="${isUser ? 'bg-blue-600 text-white shadow-blue-100' : 'bg-gray-100 text-gray-800 border border-gray-100'} px-5 py-3 rounded-[1.5rem] text-sm shadow-md ai-message">
                            ${content.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                </div>`;
            chatContainer.innerHTML += msgHtml;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const query = chatInput.value.trim();
            const imageFile = imageInput.files[0];

            if (!query && !imageFile) return;

            document.getElementById('welcomeScreen')?.remove();

            // Foydalanuvchi xabari ko'rinishi
            appendMessage('user', query || "Rasm yuborildi");
            
            chatInput.value = '';
            chatInput.style.height = 'auto';
            clearImage();

            // Yuklanish indikatori
            const loadingId = "loading-" + Date.now();
            chatContainer.innerHTML += `
                <div id="${loadingId}" class="flex gap-3 mb-4">
                    <div class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-blue-600 text-xs">
                        <i class="fas fa-robot animate-spin"></i>
                    </div>
                    <div class="bg-gray-100 text-gray-400 px-5 py-3 rounded-[1.5rem] text-sm animate-pulse">O'ylayapman...</div>
                </div>`;
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const formData = new FormData();
                formData.append('query', query || "Ushbu rasmni tahlil qil");
                formData.append('email', userEmail);
                if (imageFile) formData.append('image', imageFile);

                const response = await fetch('/ask-ai', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                document.getElementById(loadingId).remove();
                appendMessage('assistant', data.answer);
            } catch (error) {
                document.getElementById(loadingId).innerText = "Xatolik yuz berdi.";
            }
        }

        // Textarea balandligini avtomatik sozlash
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
