<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Financy | Kirish</title>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .bg-aqua { background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%); }
    </style>
</head>
<body class="bg-aqua min-h-screen flex items-center justify-center p-4">
    <div class="glass w-full max-w-md rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-blue-500 mx-auto shadow-md mb-4">
                <i class="fas fa-lock text-2xl"></i>
            </div>
            <h1 class="text-3xl font-black text-blue-900 leading-none">Xush kelibsiz</h1>
            <p class="text-blue-800/50 text-sm mt-3 font-medium">Ma'lumotlaringizni kiriting</p>
        </div>

        {% if request.query_params.get('msg') == 'success' %}
        <div class="bg-green-100/50 text-green-700 p-4 rounded-2xl mb-6 text-xs font-bold text-center border border-green-200">
             Muvaffaqiyatli! Endi tizimga kiring. ✅
        </div>
        {% endif %}

        {% if error %}
        <div class="bg-red-100/50 text-red-600 p-4 rounded-2xl mb-6 text-xs font-bold text-center border border-red-200">
             {{ error }} ❌
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-4">
            <div class="relative">
                <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-blue-300"></i>
                <input type="email" name="email" placeholder="Email" class="w-full p-4 pl-12 rounded-2xl border-none glass focus:ring-2 focus:ring-blue-400 outline-none transition" required>
            </div>
            <div class="relative">
                <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-blue-300"></i>
                <input type="password" name="password" placeholder="Parol" class="w-full p-4 pl-12 rounded-2xl border-none glass focus:ring-2 focus:ring-blue-400 outline-none transition" required>
            </div>

            <button class="w-full bg-blue-500 text-white p-4 rounded-2xl font-black text-lg shadow-lg hover:bg-blue-600 active:scale-95 transition-all mt-4">
                Kirish
            </button>
        </form>

        <div class="mt-10 pt-6 border-t border-white/30 text-center">
            <p class="text-sm text-blue-900/60 font-medium">
                Hali ham a'zo emasmisiz? <br>
                <a href="/" class="text-blue-600 font-black hover:underline">Ro'yxatdan o'tish</a>
            </p>
        </div>
    </div>
</body>
</html>
